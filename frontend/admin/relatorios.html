<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Gestão de Loja</title>
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Gestão Loja</h2>
        </div>
        
        <div class="menu">
            <a href="dashboard.html" class="menu-item">Dashboard</a>
            <a href="produtos.html" class="menu-item">Produtos</a>
            <a href="stock.html" class="menu-item">Stock</a>
            <a href="vendas.html" class="menu-item">Vendas</a>
            <a href="relatorios.html" class="menu-item active">Relatórios</a>
            <a href="utilizadores.html" class="menu-item">Utilizadores</a>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">
        
        <div class="header">
            <h1>Relatórios</h1>
            <div class="user-info">
                <span>Bem-vindo, <strong>Admin</strong></span>
                <button onclick="logout()" class="btn-sair">Sair</button>
            </div>
        </div>

        <div class="card">
            <h2>Resumo de Vendas</h2>
            <table class="tabela" id="tabela-relatorios">
                <thead>
                    <tr>
                        <th>Período</th>
                        <th>Total Vendas</th>
                        <th>Nº de Vendas</th>
                        <th>Produto Mais Vendido</th>
                    </tr>
                </thead>
                <tbody id="lista-relatorios">
                    <!-- Preenchido pelo JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/relatorios.js"></script>
    <script src="relatorios.js"></script>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissavaStore - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <!-- LADO DIREITO -->
        <div class="lado-direito">

            <div class="login-box">

                <span class="small-title">
                    ACESSO AO SISTEMA
                </span>

                <h1>Bem-vindo de volta</h1>

                <p>
                    Selecione o seu perfil e entre na sua conta
                </p>

                <!-- PERFIS -->
                <div class="Tipo_Acesso">

                    <label>
                        <input type="radio" name="tipo_acesso" checked>
                        Administrador
                    </label>

                    <label>
                        <input type="radio" name="tipo_acesso">
                        Utilizador
                    </label>

                </div>

                <!-- FORM -->
                <form>

                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" placeholder="exemplo@gmail.com" required>
                    </div>

                    <div class="input-group">
                        <label>Palavra-passe</label>
                        <input type="password" placeholder="••••••••" required >
                    </div>

                    <div class="esqueci-senha">
                        <a href="#">Esqueceu a palavra-passe?</a>
                    </div>

                    <button type="submit">
                        Entrar
                    </button>

                </form>

                <div class="rodape">
                    <p>
                        MissavaStore © 2025 — Sistema de Gestão de Lojas
                    </p>
                </div>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
